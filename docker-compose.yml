name: chikin

# Multi-Chrome MCP gateway fleet.
#
#   host Claude Code ──HTTP/MCP+bearer──► gateway (127.0.0.1:8080)
#                                            │ scoped docker API (socket-proxy)
#                                            └─ provisions chikin-chrome-<name>
#                                               on demand (internal chikin-net)
#
# Bring up the control plane (pulls pinned images from ghcr — builds nothing):
#   docker compose --profile build pull   # fetch gateway + fleet browser images
#   docker compose up -d
# Developers build locally instead by layering docker-compose.dev.yml on top
# (see that file, or `make dev-build`). Pin the image tag with CHIKIN_VERSION
# in .env. Browsers are created on demand by the gateway; NOT compose services.

services:
  # Pull anchor for the fleet browser image. Not a running service (the gateway
  # provisions chrome containers from this image at runtime) — it exists only so
  # `docker compose --profile build pull` fetches the image locally, satisfying
  # the gateway's startup image check. The "build" profile keeps it out of
  # `up`. Developers build it locally via docker-compose.dev.yml.
  chrome-image:
    image: ghcr.io/jra3/chikin:${CHIKIN_VERSION:-latest}
    profiles: ["build"]
    entrypoint: ["true"]
    restart: "no"

  # One-shot: make the shared scratch dir world-writable (1777, sticky) before
  # any browser mounts it as ~/Downloads. Idempotent — safe every `up`.
  shared-init:
    # Pinned by digest (busybox:1.36) — this runs as root against a host bind
    # mount, so the exact bytes matter. See CHK-008.
    image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    container_name: chikin-shared-init
    user: root
    command: ["chmod", "1777", "/shared"]
    volumes:
      - /tmp/chikin-shared:/shared
    restart: "no"

  # Scoped Docker API. The gateway provisions browsers through this proxy, never
  # the raw socket. Read-only socket mount; only the path groups we need are
  # enabled (containers + volumes + images + networks; POST for create/start/
  # stop). No EXEC, no host info, no swarm, etc.
  docker-socket-proxy:
    # Pinned by digest — this is the enforcement point for the Docker control
    # plane (holds the RO /var/run/docker.sock mount), so a mutable :latest here
    # is the single highest-value tag to lock down. See CHK-008.
    image: tecnativa/docker-socket-proxy:0.3.0@sha256:9e4b9e7517a6b660f2cc903a19b257b1852d5b3344794e3ea334ff00ae677ac2
    container_name: chikin-socket-proxy
    environment:
      CONTAINERS: "1"
      VOLUMES: "1"
      IMAGES: "1"
      NETWORKS: "1"
      POST: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - chikin-net
    restart: unless-stopped

  gateway:
    image: ghcr.io/jra3/chikin-gateway:${CHIKIN_VERSION:-latest}
    container_name: chikin-gateway
    init: true
    restart: unless-stopped
    ports:
      # Loopback only. MCP is bearer-protected; the dashboard/VNC proxy are
      # loopback-trusted. Never change the host side to 0.0.0.0.
      - "127.0.0.1:8080:8080"
    environment:
      # Bind all interfaces *inside* the container; the host-side mapping below
      # (127.0.0.1:8080) is what restricts reachability to loopback.
      HOST: "0.0.0.0"
      # Empty disables bearer auth — fine because the published port is bound to
      # 127.0.0.1 only (loopback-trusted). Set a token to require one.
      GATEWAY_TOKEN: "${GATEWAY_TOKEN:-}"
      MAX_FLEET: "${MAX_FLEET:-8}"
      IDLE_TTL_SEC: "${IDLE_TTL_SEC:-900}"
      REAP_INTERVAL_SEC: "${REAP_INTERVAL_SEC:-30}"
      PROVISION_TIMEOUT_SEC: "${PROVISION_TIMEOUT_SEC:-90}"
      WINDOW_SIZE: "${WINDOW_SIZE:-1920,1080}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Wedge self-healing knobs (issue #15). CDM_EXTRA_ARGS e.g.
      # "--experimentalPageIdRouting" to bypass the sticky page binding.
      CDM_EXTRA_ARGS: "${CDM_EXTRA_ARGS:-}"
      NAV_VERIFY_DELAY_MS: "${NAV_VERIFY_DELAY_MS:-2500}"
      CHROME_IMAGE: "ghcr.io/jra3/chikin:${CHIKIN_VERSION:-latest}"
      # Golden-profile seed volume. Empty = off; set to chikin-seed and populate
      # it with bin/chikin-snapshot to have new browsers start logged in.
      SEED_VOLUME: "${SEED_VOLUME:-}"
      CHIKIN_NETWORK: "chikin-net"
      CHIKIN_EGRESS_NETWORK: "chikin-egress"
      SHARED_DIR: "/tmp/chikin-shared"
      DOCKER_PROXY_HOST: "docker-socket-proxy"
      DOCKER_PROXY_PORT: "2375"
    depends_on:
      shared-init:
        condition: service_completed_successfully
      docker-socket-proxy:
        condition: service_started
    networks:
      # chikin-net (internal) reaches the socket-proxy and the chrome CDP
      # endpoints; chikin-egress is non-internal so the published 8080 port can
      # actually accept ingress from the host (internal-only nets can't).
      - chikin-net
      - chikin-egress
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  # Control plane: gateway <-> socket-proxy <-> chrome CDP. internal: true means
  # no external connectivity, so a no-auth CDP endpoint can never be reached
  # from outside Docker. The gateway's published port (ingress) still works.
  chikin-net:
    name: chikin-net
    internal: true
  # Egress: gives provisioned browsers real internet access for browsing.
  chikin-egress:
    name: chikin-egress
