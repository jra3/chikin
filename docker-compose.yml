services:
  # One-shot: Docker auto-creates /tmp/chikin-shared as root:root 0755 if it
  # doesn't exist, which blocks the chrome user (UID 997) from writing. This
  # sidecar runs as root and flips it to 1777 sticky before chrome starts.
  # Idempotent — safe to re-run every `up`.
  shared-init:
    image: busybox
    container_name: chikin-shared-init
    user: root
    command: ["chmod", "1777", "/shared"]
    volumes:
      - /tmp/chikin-shared:/shared
    restart: "no"

  chrome:
    build: .
    image: chikin:local
    container_name: chikin
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      - "127.0.0.1:9322:9222"   # host:container. Never change host side to 0.0.0.0.
    environment:
      CDP_PORT: "${CDP_PORT:-9222}"
      WINDOW_SIZE: "${WINDOW_SIZE:-1920,1080}"
      DISPLAY_NUM: "${DISPLAY_NUM:-99}"
      EXTRA_CHROME_ARGS: "${EXTRA_CHROME_ARGS:-}"
    volumes:
      - chikin-data:/data
      # Shared scratch dir between host and container.
      # - Host side: /tmp/chikin-shared (1777 world-writable, sticky like /tmp)
      # - Container side: /shared (rw)
      # - Container side: /home/chrome/Downloads (rw, same dir) — so Chrome's
      #   downloads land here AND host can read/write the same files.
      # Workflow:
      #   * host -> container: copy file into /tmp/chikin-shared, then call
      #     upload_file with /shared/foo.jpg. Chrome (UID 997) reads via the bind.
      #   * container -> host: Chrome download dialog -> /home/chrome/Downloads
      #     -> appears on host at /tmp/chikin-shared.
      - /tmp/chikin-shared:/shared:rw
      - /tmp/chikin-shared:/home/chrome/Downloads:rw
    depends_on:
      shared-init:
        condition: service_completed_successfully
    networks:
      - chikin-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${CDP_PORT:-9222}/json/version >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  chikin-net:
    driver: bridge

volumes:
  chikin-data:
