# Single-container chikin: one standalone non-headless Chrome on a loopback CDP
# port. This is the original chikin, independent of the gateway fleet.
#
#   docker compose -f docker-compose.standalone.yml up -d
#   curl -s http://localhost:9322/json/version   # should NOT say HeadlessChrome
services:
  chrome:
    build: .
    image: chikin:local
    container_name: chikin
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      - "127.0.0.1:9322:9222"   # host:container. Never change host side to 0.0.0.0.
    environment:
      CDP_PORT: "${CDP_PORT:-9222}"
      WINDOW_SIZE: "${WINDOW_SIZE:-1920,1080}"
      DISPLAY_NUM: "${DISPLAY_NUM:-99}"
      ENABLE_VNC: "${ENABLE_VNC:-0}"      # set 1 (and publish 6080) for noVNC
      EXTRA_CHROME_ARGS: "${EXTRA_CHROME_ARGS:-}"
    volumes:
      - chikin-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${CDP_PORT:-9222}/json/version >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  chikin-data:
