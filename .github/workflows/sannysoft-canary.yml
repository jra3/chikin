name: sannysoft-canary

on:
  schedule:
    - cron: "17 13 * * 1"   # Mondays at 13:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build chrome image (load)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:canary
          cache-from: type=gha

      - name: Build gateway image (load)
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}-gateway:canary
          cache-from: type=gha,scope=gateway

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Drive a fleet-provisioned browser to bot.sannysoft.com through the
      # gateway (the fleet never exposes CDP). CHIKIN_VERSION=canary points
      # compose at the :canary images loaded above.
      - name: Fleet up + sannysoft canary via the gateway
        env:
          CHIKIN_VERSION: canary
        run: |
          docker compose up -d
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8080/healthz > /dev/null; then
              echo "gateway healthy after $((i * 2))s"; break
            fi
            sleep 2
          done
          ( cd verify && npm ci && node verify-fleet.js --sannysoft )

      - name: Dump compose logs
        if: always()
        run: docker compose logs > compose.log 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: canary-compose-logs
          path: compose.log

      - name: Tear down fleet
        if: always()
        env:
          CHIKIN_VERSION: canary
        run: docker compose --profile build down -v || true
