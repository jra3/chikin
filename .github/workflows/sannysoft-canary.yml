name: sannysoft-canary

on:
  schedule:
    - cron: "17 13 * * 1"   # Mondays at 13:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: chikin:canary
          cache-from: type=gha

      - name: Run container
        run: |
          docker run -d \
            --name chikin \
            --shm-size=2g \
            -p 127.0.0.1:9322:9222 \
            chikin:canary

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:9322/json/version > /dev/null; then exit 0; fi
            sleep 1
          done
          echo "CDP did not come up in 30s"
          docker logs chikin
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run verify with sannysoft
        working-directory: verify
        run: |
          npm ci
          node verify.js

      - name: Dump container logs
        if: always()
        run: docker logs chikin > chrome.log 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: canary-chrome-logs
          path: chrome.log
