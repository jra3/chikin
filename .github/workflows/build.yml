name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-verify-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (local, with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: chikin:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          docker run -d \
            --name chikin \
            --shm-size=2g \
            -p 127.0.0.1:9322:9222 \
            chikin:ci

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:9322/json/version > /dev/null; then
              echo "CDP up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "CDP did not come up in 30s"
          docker logs chikin
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Unit tests (verify)
        working-directory: verify
        run: |
          npm ci
          npm test

      - name: Integration test (verify against live container)
        working-directory: verify
        run: node verify.js --skip-sannysoft

      - name: Dump container logs
        if: always()
        run: docker logs chikin > chrome.log 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chrome-logs
          path: chrome.log

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
