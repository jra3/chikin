name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            short: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            short: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build chrome image for testing (load)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: ghcr.io/${{ github.repository }}:ci
          cache-from: type=gha,scope=${{ matrix.short }}
          cache-to: type=gha,mode=max,scope=${{ matrix.short }}

      - name: Build gateway image for testing (load)
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          platforms: ${{ matrix.platform }}
          load: true
          tags: ghcr.io/${{ github.repository }}-gateway:ci
          cache-from: type=gha,scope=gateway-${{ matrix.short }}
          cache-to: type=gha,mode=max,scope=gateway-${{ matrix.short }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Unit tests (verify)
        working-directory: verify
        run: |
          npm ci
          npm test

      # Stand up the whole fleet from the locally-built images and prove a
      # provisioned browser is non-headless THROUGH the gateway (the fleet never
      # exposes CDP). CHIKIN_VERSION=ci points compose at the :ci images loaded
      # above; they're present locally so compose won't try to pull them.
      - name: Fleet smoke test (non-headless via the gateway)
        env:
          CHIKIN_VERSION: ci
        run: |
          docker compose up -d
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8080/healthz > /dev/null; then
              echo "gateway healthy after $((i * 2))s"; break
            fi
            sleep 2
          done
          ( cd verify && node verify-fleet.js )

      - name: Dump compose logs
        if: always()
        run: docker compose logs > compose.log 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compose-logs-${{ matrix.short }}
          path: compose.log

      - name: Tear down fleet
        if: always()
        env:
          CHIKIN_VERSION: ci
        run: docker compose --profile build down -v || true

      - name: Push image by digest
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.short }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.short }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect result
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}

  # Gateway image (Node/TS control plane). Small, so build both arches in one
  # QEMU step rather than the per-arch digest-merge dance the Chrome image uses.
  # Builds on PRs (validates the Dockerfile), pushes on main/tags.
  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-gateway
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway
