name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            short: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            short: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for testing (load into local docker)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: chikin:ci
          cache-from: type=gha,scope=${{ matrix.short }}
          cache-to: type=gha,mode=max,scope=${{ matrix.short }}

      - name: Run container
        run: |
          docker run -d \
            --name chikin \
            --shm-size=2g \
            -p 127.0.0.1:9322:9222 \
            chikin:ci

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:9322/json/version > /dev/null; then
              echo "CDP up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "CDP did not come up in 30s"
          docker logs chikin
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Unit tests (verify)
        working-directory: verify
        run: |
          npm ci
          npm test

      - name: Integration test (verify against live container)
        working-directory: verify
        run: node verify.js --skip-sannysoft

      - name: Dump container logs
        if: always()
        run: docker logs chikin > chrome.log 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chrome-logs-${{ matrix.short }}
          path: chrome.log

      - name: Stop test container
        if: always()
        run: docker rm -f chikin || true

      - name: Push image by digest
        if: github.event_name != 'pull_request'
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.short }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.short }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect result
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
